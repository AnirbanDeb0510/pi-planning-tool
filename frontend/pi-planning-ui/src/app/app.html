<!-- Simple Toolbar with Theme Toggle -->
<div class="app-toolbar">
  <h1 class="app-title" (click)="navigateHome()" title="{{ TOOLTIPS.APP.HOME }}">{{ title() }}</h1>
  <button class="theme-toggle" (click)="toggleTheme()" title="{{ TOOLTIPS.APP.THEME_TOGGLE }}">
    @if (currentTheme() === 'light') {
      <span>{{ LABELS.APP.THEME_DARK }}</span>
    } @else if (currentTheme() === 'dark') {
      <span>{{ LABELS.APP.THEME_LIGHT }}</span>
    }
  </button>
</div>

@if (serverStatus() === 'connecting') {
  <div class="server-status-overlay">
    <div class="server-status-card">
      <div class="connecting-spinner"></div>
      <p class="connecting-message">Connecting to server&hellip;</p>
      <p class="connecting-hint">This may take a few seconds on first load.</p>
    </div>
  </div>
} @else if (serverStatus() === 'error') {
  <div class="server-status-overlay">
    <div class="server-status-card error">
      <p class="connecting-message">⚠️ Could not reach the server.</p>
      <p class="connecting-hint">Check your connection and refresh the page.</p>
    </div>
  </div>
} @else {
  <router-outlet />
}
