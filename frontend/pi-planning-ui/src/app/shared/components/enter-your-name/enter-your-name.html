<div class="home-container">
  <h2>{{ MESSAGES.APP.WELCOME }}</h2>
  <p>{{ MESSAGES.APP.ENTER_NAME_PROMPT }}</p>

  <input
    type="text"
    [(ngModel)]="userName"
    placeholder="{{ PLACEHOLDERS.USER_NAME }}"
    class="input-name"
    (keyup.enter)="startBoard()"
    [class.error]="errorMessage"
  />

  @if (errorMessage) {
    <p class="error-message">{{ errorMessage }}</p>
  }

  <button class="btn-start" (click)="startBoard()">{{ LABELS.BUTTONS.START_BOARD }}</button>
</div>
